<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>나스닥 ETF 대시보드</title>
<style>
:root {
--bg-color: #0f172a;
--card-bg: #1e293b;
--text-main: #f8fafc;
--text-sub: #94a3b8;
--up-color: #ef4444;
--down-color: #3b82f6;
--btn-bg: #2563eb;
}

body {
font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
background-color: var(--bg-color);
color: var(--text-main);
margin: 0;
padding: 20px;
padding-bottom: 40px;
}

header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 24px;
padding-top: 10px;
}

h1 { font-size: 22px; margin: 0; font-weight: 700; }

.etf-card {
background-color: var(--card-bg);
border-radius: 16px;
padding: 20px;
margin-bottom: 16px;
box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}

.etf-header {
display: flex;
justify-content: space-between;
margin-bottom: 12px;
}

.etf-name { font-weight: 600; font-size: 16px; }
.etf-ticker { color: var(--text-sub); font-size: 13px; }

.etf-price-row {
display: flex;
align-items: baseline;
gap: 12px;
}

.price { font-size: 24px; font-weight: 700; }

.change {
font-size: 15px;
font-weight: 600;
padding: 4px 8px;
border-radius: 6px;
}

.up { color: var(--up-color); background-color: rgba(239, 68, 68, 0.1); }
.down { color: var(--down-color); background-color: rgba(59, 130, 246, 0.1); }

.copy-btn {
width: 100%;
background-color: var(--btn-bg);
color: white;
border: none;
padding: 16px;
border-radius: 12px;
font-size: 16px;
font-weight: 600;
margin-top: 10px;
cursor: pointer;
transition: opacity 0.2s;
}

.copy-btn:disabled {
background-color: #475569;
cursor: not-allowed;
}

.last-update {
text-align: center;
color: var(--text-sub);
font-size: 12px;
margin-top: 24px;
}

.loading {
text-align: center;
padding: 40px 0;
color: var(--text-sub);
}
</style>
</head>
<body>

<header>
<h1>🇺🇸 나스닥 ETF 모니터링</h1>
</header>

<div id="dashboard">
<div class="loading">실시간 시장 데이터를 불러오는 중입니다... ⏳</div>
</div>

<button class="copy-btn" id="copyBtn" onclick="copyReport()" disabled>📋 주요 수치 보고용 복사</button>
<div class="last-update" id="time-display">데이터 대기 중...</div>

<script>
// 전역 변수로 데이터 저장 (복사 기능을 위함)
let etfDataList = [];

function formatNumber(num, isKRW) {
return isKRW ? Math.round(num).toLocaleString() + '원' : '$`' + num.toFixed(2);
}

// 야후 파이낸스 API에서 데이터를 가져오는 핵심 함수
async function fetchETFData() {
// 조회할 종목 리스트 (한국 주식은 뒤에 .KS를 붙입니다)
const tickers = [
{ name: 'KoAct 미국나스닥100액티브', symbol: '468960.KS', isKRW: true },
{ name: 'Invesco QQQ Trust', symbol: 'QQQ', isKRW: false },
{ name: 'Invesco NASDAQ 100', symbol: 'QQQM', isKRW: false }
 ];

try {
// 여러 종목의 데이터를 동시에 요청 (Promise.all)
const results = await Promise.all(tickers.map(async (ticker) => {
const url = https://query1.finance.yahoo.com/v8/finance/chart/${ticker.symbol}; // 브라우저 보안(CORS) 우회를 위해 무료 프록시 서버(allorigins) 사용 const proxyUrl =https://api.allorigins.win/get?url=${encodeURIComponent(url)};

const response = await fetch(proxyUrl);
const rawData = await response.json();
const data = JSON.parse(rawData.contents); // 프록시에서 가져온 실제 데이터 파싱

const meta = data.chart.result[0].meta;
const price = meta.regularMarketPrice;
const prevClose = meta.chartPreviousClose;

const changeAmount = price - prevClose;
const changeRate = (changeAmount / prevClose) * 100;

return {
name: ticker.name,
ticker: ticker.symbol.replace('.KS', ''),
price: price,
changeRate: changeRate,
changeAmount: changeAmount,
isKRW: ticker.isKRW
};
}));

etfDataList = results;
renderDashboard(results);
document.getElementById('copyBtn').disabled = false;

} catch (error) {
document.getElementById('dashboard').innerHTML =
<div class="loading" style="color: #ef4444;"&gt;데이터를 불러오는데 실패했습니다.&lt;br&gt;잠시 후 새로고침 해주세요.&lt;/div>;
console.error('API 로드 에러:', error);
}
}

function renderDashboard(data) {
const container = document.getElementById('dashboard');
container.innerHTML = '';

data.forEach(etf => {
const isUp = etf.changeRate > 0;
const changeClass = isUp ? 'up' : 'down';
const sign = isUp ? '▲' : '▼';

const cardHTML = &lt;div class="etf-card"&gt; &lt;div class="etf-header"&gt; &lt;span class="etf-name"&gt;${etf.name}</span>
<span class="etf-ticker">{formatNumber(etf.price, etf.isKRW)}</span>
<span class="change {sign} {Math.abs(etf.changeRate).toFixed(2)}%)
</span>
</div>
</div>
`;
container.innerHTML += cardHTML;
});

const now = new Date();
document.getElementById('time-display').innerText = 최근 업데이트: ${now.toLocaleTimeString()}`;
}

function copyReport() {
if (etfDataList.length === 0) return;

let reportText = "[나스닥 주요 ETF 동향]\n\n";
etfDataList.forEach(etf => {
const isUp = etf.changeRate > 0;
const sign = isUp ? '▲' : '▼';
reportText += -${etf.name}: {sign}${Math.abs(etf.changeRate).toFixed(2)}%)\n`;
});

navigator.clipboard.writeText(reportText).then(() => {
alert("보고용 텍스트가 클립보드에 복사되었습니다.");
}).catch(err => {
alert("복사에 실패했습니다.");
});
}

// 앱 실행 시 실시간 데이터 호출
fetchETFData();
</script>
</body>
</html>
