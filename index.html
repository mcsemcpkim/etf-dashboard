<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>나스닥 ETF 대시보드 Pro</title>
<style>
:root {
--bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc;
--text-sub: #94a3b8; --up-color: #ef4444; --down-color: #3b82f6;
--btn-bg: #2563eb; --input-bg: #334155; --border-color: #334155;
}

* { box-sizing: border-box; }
body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; padding-bottom: 40px; }
header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-top: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 16px; }
h1 { font-size: 22px; margin: 0; font-weight: 700; letter-spacing: -0.5px; }

.controls { display: flex; gap: 8px; margin-bottom: 24px; background-color: var(--card-bg); padding: 16px; border-radius: 12px; border: 1px solid var(--border-color); }
.input-group { display: flex; flex: 1; gap: 8px; }
.controls input { flex: 1; min-width: 0; background-color: var(--input-bg); border: 1px solid transparent; color: white; padding: 12px; border-radius: 8px; font-size: 14px; transition: border 0.2s; }
.controls input:focus { outline: none; border-color: var(--btn-bg); }
.btn { color: white; border: none; padding: 0 16px; border-radius: 8px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: opacity 0.2s; }
.btn:active { opacity: 0.8; }
.add-btn { background-color: var(--btn-bg); }

.etf-card { background-color: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 16px; position: relative; border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 12px; }
.etf-header { display: flex; justify-content: space-between; align-items: center; padding-right: 24px; }
.etf-name { font-weight: 600; font-size: 16px; }
.etf-ticker { color: var(--text-sub); font-size: 13px; margin-left: 8px; }

.etf-body { display: flex; align-items: baseline; justify-content: space-between; }
.price { font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; }
.change { font-size: 15px; font-weight: 600; padding: 6px 10px; border-radius: 8px; }
.up { color: var(--up-color); background-color: rgba(239, 68, 68, 0.1); }
.down { color: var(--down-color); background-color: rgba(59, 130, 246, 0.1); }
.error-state { color: #f59e0b; font-size: 14px; }

.delete-btn { position: absolute; top: 16px; right: 16px; background: none; border: none; color: #64748b; font-size: 18px; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; }

.action-bar { display: flex; gap: 12px; margin-top: 24px; }
.copy-btn { flex: 1; background-color: var(--btn-bg); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
.reset-btn { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-sub); padding: 16px; border-radius: 12px; font-size: 14px; cursor: pointer; }

.status-text { text-align: center; color: var(--text-sub); font-size: 12px; margin-top: 20px; }

/* 카드별 로딩 애니메이션 */
.skeleton { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
.skeleton-text { height: 20px; background-color: var(--input-bg); border-radius: 4px; width: 50%; }
.skeleton-price { height: 32px; background-color: var(--input-bg); border-radius: 4px; width: 40%; margin-top: 12px; }
</style>
</head>
<body>

<header>
<h1>🇺🇸 나스닥 모니터링 <span style="color:#38bdf8; font-size:14px; font-weight:normal;">PRO</span></h1>
</header>

<div class="controls">
<div class="input-group">
<input type="text" id="newName" placeholder="종목명 (예: 애플)" autocomplete="off">
<input type="text" id="newTicker" placeholder="티커 (예: AAPL)" autocomplete="off">
</div>
<button class="btn add-btn" onclick="app.addTicker()">추가</button>
</div>

<div id="dashboard"></div>

<div class="action-bar">
<button class="copy-btn" onclick="app.copyReport()">📋 보고서용 요약 복사</button>
<button class="reset-btn" onclick="app.resetData()">초기화</button>
</div>

<div class="status-text" id="status-display">시스템 준비 완료</div>

<script>
/**
* Chrome 최적화 Pro 버전 (ES6+ Class Base)
*/
class DashboardApp {
constructor() {
this.storageKey = 'etf_dashboard_pro_data';
this.defaultTickers = [
{ name: 'KoAct 미국나스닥100액티브', symbol: '468960.KS', isKRW: true },
{ name: 'Invesco QQQ Trust', symbol: 'QQQ', isKRW: false },
{ name: 'Invesco NASDAQ 100', symbol: 'QQQM', isKRW: false }
 ];

this.tickers = this.loadData();
this.fetchedResults = [];

// 앱 초기화 및 실행
this.init();
}

loadData() {
try {
const data = localStorage.getItem(this.storageKey);
return data ? JSON.parse(data) : this.defaultTickers;
} catch(e) {
console.warn("로컬 스토리지 접근 불가");
return this.defaultTickers;
}
}

saveData() {
try {
localStorage.setItem(this.storageKey, JSON.stringify(this.tickers));
} catch(e) {
console.warn("데이터 저장 실패");
}
}

resetData() {
if(confirm("기본 종목 리스트로 초기화하시겠습니까?")) {
localStorage.removeItem(this.storageKey);
location.reload();
}
}

formatNumber(num, isKRW) {
if(typeof num !== 'number') return '-';
return isKRW ? Math.round(num).toLocaleString() + '원' : '$`' + num.toFixed(2);
}

// 개별 카드의 로딩 뼈대(Skeleton) 렌더링
renderSkeleton() {
const container = document.getElementById('dashboard');
container.innerHTML = this.tickers.map((t, index) => &lt;div class="etf-card skeleton" id="card-${index}">
<div class="etf-header">
<div><span class="etf-name">{t.symbol.replace('.KS','')}</span></div>
</div>
<div class="skeleton-price"></div>
</div>
`).join('');
document.getElementById('status-display').innerText = "실시간 시장 데이터를 불러오는 중입니다...";
}

// 크롬 보안에 걸리지 않는 안전한 통신 모듈 (JSONP 래핑 방식)
async fetchTickerData(ticker, index) {
const url = https://query1.finance.yahoo.com/v8/finance/chart/${ticker.symbol}; // raw 대신 get을 사용하여 보안 헤더 충돌 방지 const proxyUrl =https://api.allorigins.win/get?url=${encodeURIComponent(url)};

try {
const response = await fetch(proxyUrl, { cache: 'no-store' });
if (!response.ok) throw new Error('Proxy Network Error');

const json = await response.json();
if (!json.contents) throw new Error('No Contents');

const rawData = JSON.parse(json.contents);
if(!rawData.chart || !rawData.chart.result) throw new Error("Invalid Ticker Data");

const meta = rawData.chart.result[0].meta;
const price = meta.regularMarketPrice;
const prevClose = meta.chartPreviousClose;
const changeAmount = price - prevClose;
const changeRate = prevClose !== 0 ? (changeAmount / prevClose) * 100 : 0;

return { success: true, index, ticker, price, changeRate, changeAmount };
} catch (error) {
console.error(Fetch error for ${ticker.symbol}:`, error);
return { success: false, index, ticker };
}
}

// 개별 카드 업데이트 로직
updateCardUI(result) {
const card = document.getElementById(card-${result.index}`);
if(!card) return;

card.classList.remove('skeleton');

const t = result.ticker;
const tickerName = t.symbol.replace('.KS', '');
const deleteBtn = <button class="delete-btn" onclick="app.removeTicker(${result.index})">✕</button>`;

if (result.success) {
const isUp = result.changeRate > 0;
const changeClass = isUp ? 'up' : 'down';
const sign = isUp ? '▲' : '▼';

card.innerHTML = ${deleteBtn}
<div class="etf-header">
<div><span class="etf-name">{tickerName}</span></div>
</div>
<div class="etf-body">
<span class="price">{changeClass}">
{Math.abs(result.changeAmount).toFixed(2)} ({deleteBtn}
<div class="etf-header">
<div><span class="etf-name">{tickerName}</span></div>
</div>
<div class="etf-body">
<span class="error-state">⚠️ 데이터를 불러올 수 없습니다.</span>
</div>
`;
}
}

async init() {
if (this.tickers.length === 0) {
document.getElementById('dashboard').innerHTML = '<div style="text-align:center; padding: 40px; color: #94a3b8;">등록된 종목이 없습니다.</div>';
return;
}

this.renderSkeleton();
this.fetchedResults = [];

// 병렬로 개별 통신 시작 (하나가 실패해도 다른 것에 영향을 주지 않음)
const promises = this.tickers.map((ticker, index) =>
this.fetchTickerData(ticker, index).then(result => {
this.fetchedResults.push(result);
this.updateCardUI(result);
})
);

await Promise.allSettled(promises);

const now = new Date();
document.getElementById('status-display').innerText = 최근 업데이트: ${now.toLocaleTimeString()}`;
}

addTicker() {
const nameInput = document.getElementById('newName');
const tickerInput = document.getElementById('newTicker');
const name = nameInput.value.trim();
let symbol = tickerInput.value.trim().toUpperCase();

if (!name || !symbol) return alert("종목명과 티커를 모두 입력해 주세요.");

const isKoreanStock = /^\d{6}`$/.test(symbol);
if (isKoreanStock) symbol += '.KS';

this.tickers.push({
name: name,
symbol: symbol,
isKRW: isKoreanStock || symbol.includes('.KS')
});

this.saveData();
nameInput.value = '';
tickerInput.value = '';
this.init(); // 화면 갱신
}

removeTicker(index) {
if(confirm("이 종목을 삭제하시겠습니까?")) {
this.tickers.splice(index, 1);
this.saveData();
this.init();
}
}

async copyReport() {
const validResults = this.fetchedResults.filter(r => r.success);
if (validResults.length === 0) return alert("복사할 데이터가 없습니다.");

let text = "[주요 ETF 및 종목 동향]\n\n";
validResults.forEach(r => {
const isUp = r.changeRate > 0;
const sign = isUp ? '▲' : '▼';
text += - ${r.ticker.name}: ${this.formatNumber(r.price, r.ticker.isKRW)} (${sign}${Math.abs(r.changeRate).toFixed(2)}%)\n;
});

// 크롬 로컬 환경(file://)에서의 복사 보안 정책 우회 로직
try {
await navigator.clipboard.writeText(text);
alert("보고용 텍스트가 클립보드에 복사되었습니다.");
} catch (err) {
// 구형 복사 방식 폴백 (Fallback)
const textArea = document.createElement("textarea");
textArea.value = text;
textArea.style.position = "fixed";
document.body.appendChild(textArea);
textArea.focus();
textArea.select();
try {
document.execCommand('copy');
alert("보고용 텍스트가 클립보드에 복사되었습니다.");
} catch (e) {
alert("보안 정책으로 복사에 실패했습니다. 아래 텍스트를 직접 복사해주세요.\n\n" + text);
}
document.body.removeChild(textArea);
}
}
}

// DOM이 완전히 로드된 후 앱 실행 (크롬 렌더링 멈춤 방지)
document.addEventListener('DOMContentLoaded', () => {
window.app = new DashboardApp();
});
</script>
</body>
</html>
