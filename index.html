<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>나스닥 ETF 대시보드</title>
<style>
:root {
--bg-color: #0f172a;
--card-bg: #1e293b;
--text-main: #f8fafc;
--text-sub: #94a3b8;
--up-color: #ef4444;
--down-color: #3b82f6;
--btn-bg: #2563eb;
--input-bg: #334155;
}

body {
font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
background-color: var(--bg-color);
color: var(--text-main);
margin: 0;
padding: 20px;
padding-bottom: 40px;
}

header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 20px;
padding-top: 10px;
}

h1 { font-size: 22px; margin: 0; font-weight: 700; }

/* 종목 추가 폼 스타일 */
.add-form {
display: flex;
gap: 8px;
margin-bottom: 24px;
background-color: var(--card-bg);
padding: 12px;
border-radius: 12px;
}

.add-form input {
flex: 1;
background-color: var(--input-bg);
border: 1px solid #475569;
color: white;
padding: 10px;
border-radius: 8px;
font-size: 14px;
}

.add-form input::placeholder { color: #94a3b8; }

.add-btn {
background-color: var(--btn-bg);
color: white;
border: none;
padding: 0 16px;
border-radius: 8px;
font-weight: 600;
cursor: pointer;
white-space: nowrap;
}

.etf-card {
background-color: var(--card-bg);
border-radius: 16px;
padding: 20px;
margin-bottom: 16px;
box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
position: relative; /* 삭제 버튼 위치 기준 */
}

.delete-btn {
position: absolute;
top: 16px;
right: 16px;
background: none;
border: none;
color: #64748b;
font-size: 16px;
cursor: pointer;
padding: 4px;
}

.etf-header {
display: flex;
justify-content: space-between;
margin-bottom: 12px;
padding-right: 24px; /* 삭제 버튼 공간 확보 */
}

.etf-name { font-weight: 600; font-size: 16px; }
.etf-ticker { color: var(--text-sub); font-size: 13px; }

.etf-price-row {
display: flex;
align-items: baseline;
gap: 12px;
}

.price { font-size: 24px; font-weight: 700; }

.change {
font-size: 15px;
font-weight: 600;
padding: 4px 8px;
border-radius: 6px;
}

.up { color: var(--up-color); background-color: rgba(239, 68, 68, 0.1); }
.down { color: var(--down-color); background-color: rgba(59, 130, 246, 0.1); }

.copy-btn {
width: 100%;
background-color: var(--btn-bg);
color: white;
border: none;
padding: 16px;
border-radius: 12px;
font-size: 16px;
font-weight: 600;
margin-top: 10px;
cursor: pointer;
}

.copy-btn:disabled { background-color: #475569; cursor: not-allowed; }

.last-update {
text-align: center;
color: var(--text-sub);
font-size: 12px;
margin-top: 24px;
}

.loading {
text-align: center;
padding: 40px 0;
color: var(--text-sub);
}
</style>
</head>
<body>

<header>
<h1>🇺🇸 나스닥 ETF 모니터링</h1>
</header>

<!-- 종목 추가 폼 -->
<div class="add-form">
<input type="text" id="newName" placeholder="종목명 (예: 애플)">
<input type="text" id="newTicker" placeholder="티커 (예: AAPL)">
<button class="add-btn" onclick="addTicker()">추가</button>
</div>

<div id="dashboard">
<div class="loading">실시간 시장 데이터를 불러오는 중입니다... ⏳</div>
</div>

<button class="copy-btn" id="copyBtn" onclick="copyReport()" disabled>📋 주요 수치 보고용 복사</button>
<div class="last-update" id="time-display">데이터 대기 중...</div>

<script>
let etfDataList = [];

// 기본 종목 세팅 (초기 접속 시에만 사용)
const defaultTickers = [
{ name: 'KoAct 미국나스닥100액티브', symbol: '468960.KS', isKRW: true },
{ name: 'Invesco QQQ Trust', symbol: 'QQQ', isKRW: false },
{ name: 'Invesco NASDAQ 100', symbol: 'QQQM', isKRW: false }
 ];

// localStorage에서 저장된 종목을 불러오거나, 없으면 기본 종목 사용
let myTickers = JSON.parse(localStorage.getItem('myETFs')) || defaultTickers;

function saveTickers() {
localStorage.setItem('myETFs', JSON.stringify(myTickers));
}

function formatNumber(num, isKRW) {
return isKRW ? Math.round(num).toLocaleString() + '원' : '$`' + num.toFixed(2);
}

async function fetchETFData() {
if (myTickers.length === 0) {
document.getElementById('dashboard').innerHTML = '<div class="loading">등록된 종목이 없습니다.</div>';
document.getElementById('copyBtn').disabled = true;
return;
}

document.getElementById('dashboard').innerHTML = '<div class="loading">데이터를 불러오는 중입니다... ⏳</div>';

try {
const results = await Promise.all(myTickers.map(async (ticker, index) => {
const url = https://query1.finance.yahoo.com/v8/finance/chart/${ticker.symbol}; const proxyUrl =https://api.allorigins.win/get?url=${encodeURIComponent(url)};

const response = await fetch(proxyUrl);
const rawData = await response.json();

// 데이터가 없거나 오류인 경우 처리
if(!rawData.contents) throw new Error("No data");
const data = JSON.parse(rawData.contents);

if(!data.chart.result) throw new Error("Invalid Ticker");

const meta = data.chart.result[0].meta;
const price = meta.regularMarketPrice;
const prevClose = meta.chartPreviousClose;

const changeAmount = price - prevClose;
const changeRate = (changeAmount / prevClose) * 100;

return {
originalIndex: index, // 삭제 시 인덱스 추적용
name: ticker.name,
ticker: ticker.symbol.replace('.KS', ''),
price: price,
changeRate: changeRate,
changeAmount: changeAmount,
isKRW: ticker.isKRW
};
}));

etfDataList = results;
renderDashboard(results);
document.getElementById('copyBtn').disabled = false;

} catch (error) {
document.getElementById('dashboard').innerHTML =
<div class="loading" style="color: #ef4444;"&gt;데이터 로드 실패.&lt;br&gt;티커명이 정확한지 확인해 주세요.&lt;/div>;
}
}

function renderDashboard(data) {
const container = document.getElementById('dashboard');
container.innerHTML = '';

data.forEach(etf => {
const isUp = etf.changeRate > 0;
const changeClass = isUp ? 'up' : 'down';
const sign = isUp ? '▲' : '▼';

const cardHTML = &lt;div class="etf-card"&gt; &lt;button class="delete-btn" onclick="removeTicker(${etf.originalIndex})">✕</button>
<div class="etf-header">
<span class="etf-name">{etf.ticker}</span>
</div>
<div class="etf-price-row">
<span class="price">{changeClass}">
{Math.abs(etf.changeAmount).toFixed(2)} (${Math.abs(etf.changeRate).toFixed(2)}%) &lt;/span&gt; &lt;/div&gt; &lt;/div&gt;;
container.innerHTML += cardHTML;
});

const now = new Date();
document.getElementById('time-display').innerText = 최근 업데이트:${now.toLocaleTimeString()}`;
}

// 새로운 종목 추가 함수
function addTicker() {
const nameInput = document.getElementById('newName');
const tickerInput = document.getElementById('newTicker');

const name = nameInput.value.trim();
let symbol = tickerInput.value.trim().toUpperCase();

if (!name || !symbol) {
alert("종목명과 티커를 모두 입력해 주세요.");
return;
}

// 한국 주식(숫자 6자리)일 경우 자동으로 .KS를 붙이고 원화(isKRW) 처리
const isKoreanStock = /^\d{6}$`/.test(symbol);
if (isKoreanStock) {
symbol += '.KS';
}

myTickers.push({
name: name,
symbol: symbol,
isKRW: isKoreanStock || symbol.includes('.KS')
});

saveTickers(); // localStorage에 저장

// 입력창 초기화
nameInput.value = '';
tickerInput.value = '';

// 데이터 다시 불러오기
fetchETFData();
}

// 종목 삭제 함수
function removeTicker(index) {
if(confirm("이 종목을 삭제하시겠습니까?")) {
myTickers.splice(index, 1); // 배열에서 해당 종목 제거
saveTickers(); // 변경된 리스트 저장
fetchETFData(); // 화면 갱신
}
}

function copyReport() {
if (etfDataList.length === 0) return;

let reportText = "[주요 ETF 및 종목 동향]\n\n";
etfDataList.forEach(etf => {
const isUp = etf.changeRate > 0;
const sign = isUp ? '▲' : '▼';
reportText += -${etf.name}: {sign}${Math.abs(etf.changeRate).toFixed(2)}%)\n`;
});

navigator.clipboard.writeText(reportText).then(() => {
alert("보고용 텍스트가 클립보드에 복사되었습니다.");
}).catch(err => {
alert("복사에 실패했습니다.");
});
}

// 앱 최초 실행
fetchETFData();
</script>
</body>
</html>
