<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>나스닥 ETF 대시보드</title>
<style>
:root {
--bg-color: #0f172a;
--card-bg: #1e293b;
--text-main: #f8fafc;
--text-sub: #94a3b8;
--up-color: #ef4444;
--down-color: #3b82f6;
--btn-bg: #2563eb;
--input-bg: #334155;
--danger-bg: #ef4444;
}

body {
font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
background-color: var(--bg-color);
color: var(--text-main);
margin: 0;
padding: 20px;
padding-bottom: 40px;
}

header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 20px;
padding-top: 10px;
}

h1 { font-size: 22px; margin: 0; font-weight: 700; }

.add-form {
display: flex;
flex-wrap: wrap;
gap: 8px;
margin-bottom: 24px;
background-color: var(--card-bg);
padding: 12px;
border-radius: 12px;
}

.add-form input {
flex: 1;
min-width: 100px;
background-color: var(--input-bg);
border: 1px solid #475569;
color: white;
padding: 10px;
border-radius: 8px;
font-size: 14px;
}

.btn {
color: white;
border: none;
padding: 10px 16px;
border-radius: 8px;
font-weight: 600;
cursor: pointer;
white-space: nowrap;
}

.add-btn { background-color: var(--btn-bg); }
.reset-btn { background-color: var(--danger-bg); }

.etf-card {
background-color: var(--card-bg);
border-radius: 16px;
padding: 20px;
margin-bottom: 16px;
box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
position: relative;
}

.delete-btn {
position: absolute;
top: 16px;
right: 16px;
background: none;
border: none;
color: #64748b;
font-size: 16px;
cursor: pointer;
padding: 4px;
}

.etf-header {
display: flex;
justify-content: space-between;
margin-bottom: 12px;
padding-right: 24px;
}

.etf-name { font-weight: 600; font-size: 16px; }
.etf-ticker { color: var(--text-sub); font-size: 13px; }

.etf-price-row {
display: flex;
align-items: baseline;
gap: 12px;
}

.price { font-size: 24px; font-weight: 700; }

.change {
font-size: 15px;
font-weight: 600;
padding: 4px 8px;
border-radius: 6px;
}

.up { color: var(--up-color); background-color: rgba(239, 68, 68, 0.1); }
.down { color: var(--down-color); background-color: rgba(59, 130, 246, 0.1); }
.error-text { color: var(--up-color); font-size: 14px; }

.copy-btn {
width: 100%;
background-color: var(--btn-bg);
color: white;
border: none;
padding: 16px;
border-radius: 12px;
font-size: 16px;
font-weight: 600;
margin-top: 10px;
cursor: pointer;
}

.copy-btn:disabled { background-color: #475569; cursor: not-allowed; }

.last-update {
text-align: center;
color: var(--text-sub);
font-size: 12px;
margin-top: 24px;
}

.loading {
text-align: center;
padding: 40px 0;
color: var(--text-sub);
}
</style>
</head>
<body>

<header>
<h1>🇺🇸 나스닥 ETF 모니터링</h1>
</header>

<div class="add-form">
<input type="text" id="newName" placeholder="종목명">
<input type="text" id="newTicker" placeholder="티커">
<button class="btn add-btn" onclick="addTicker()">추가</button>
<button class="btn reset-btn" onclick="resetApp()">초기화</button>
</div>

<div id="dashboard">
<div class="loading">실시간 시장 데이터를 불러오는 중입니다... ⏳</div>
</div>

<button class="copy-btn" id="copyBtn" onclick="copyReport()" disabled>📋 주요 수치 보고용 복사</button>
<div class="last-update" id="time-display">데이터 대기 중...</div>

<script>
let etfDataList = [];

const defaultTickers = [
{ name: 'KoAct 미국나스닥100액티브', symbol: '468960.KS', isKRW: true },
{ name: 'Invesco QQQ Trust', symbol: 'QQQ', isKRW: false },
{ name: 'Invesco NASDAQ 100', symbol: 'QQQM', isKRW: false }
 ];

let myTickers = JSON.parse(localStorage.getItem('myETFs')) || defaultTickers;

function saveTickers() {
localStorage.setItem('myETFs', JSON.stringify(myTickers));
}

// 앱이 꼬였을 때 모든 데이터를 날리고 초기 상태로 복구하는 함수
function resetApp() {
if(confirm("모든 종목 데이터를 초기화하시겠습니까? (기본 종목으로 복구됩니다)")) {
localStorage.removeItem('myETFs');
location.reload();
}
}

function formatNumber(num, isKRW) {
return isKRW ? Math.round(num).toLocaleString() + '원' : '$`' + num.toFixed(2);
}

async function fetchETFData() {
if (myTickers.length === 0) {
document.getElementById('dashboard').innerHTML = '<div class="loading">등록된 종목이 없습니다.</div>';
document.getElementById('copyBtn').disabled = true;
return;
}

document.getElementById('dashboard').innerHTML = '<div class="loading">데이터를 불러오는 중입니다... ⏳</div>';

try {
const results = await Promise.all(myTickers.map(async (ticker, index) => {
try {
const url = https://query1.finance.yahoo.com/v8/finance/chart/${ticker.symbol}; // 더 안정적이고 빠른 프록시 서버(corsproxy.io)로 교체 const proxyUrl =https://corsproxy.io/?${encodeURIComponent(url)};

const response = await fetch(proxyUrl);
const data = await response.json();

if(!data.chart || !data.chart.result) throw new Error("Invalid Data");

const meta = data.chart.result[0].meta;
const price = meta.regularMarketPrice;
const prevClose = meta.chartPreviousClose;

const changeAmount = price - prevClose;
const changeRate = (changeAmount / prevClose) * 100;

return {
isValid: true,
originalIndex: index,
name: ticker.name,
ticker: ticker.symbol.replace('.KS', ''),
price: price,
changeRate: changeRate,
changeAmount: changeAmount,
isKRW: ticker.isKRW
};
} catch (err) {
// 특정 종목 로드 실패 시 앱 전체가 멈추지 않도록 방어
return {
isValid: false,
originalIndex: index,
name: ticker.name,
ticker: ticker.symbol
};
}
}));

etfDataList = results.filter(r => r.isValid);
renderDashboard(results);
document.getElementById('copyBtn').disabled = etfDataList.length === 0;

} catch (error) {
document.getElementById('dashboard').innerHTML =
<div class="loading" style="color: #ef4444;"&gt;데이터 로드에 완전히 실패했습니다.&lt;br&gt;빨간색 '초기화' 버튼을 눌러주세요.&lt;/div>;
}
}

function renderDashboard(data) {
const container = document.getElementById('dashboard');
container.innerHTML = '';

data.forEach(etf => {
let cardHTML = '';

if (etf.isValid) {
const isUp = etf.changeRate > 0;
const changeClass = isUp ? 'up' : 'down';
const sign = isUp ? '▲' : '▼';

cardHTML = &lt;div class="etf-card"&gt; &lt;button class="delete-btn" onclick="removeTicker(${etf.originalIndex})">✕</button>
<div class="etf-header">
<span class="etf-name">{etf.ticker}</span>
</div>
<div class="etf-price-row">
<span class="price">{changeClass}">
{Math.abs(etf.changeAmount).toFixed(2)} ({etf.originalIndex})">✕</button>
<div class="etf-header" style="margin-bottom: 0;">
<span class="etf-name">${etf.name}&lt;/span&gt; &lt;span class="error-text"&gt;데이터를 찾을 수 없습니다. 티커를 확인하세요.&lt;/span&gt; &lt;/div&gt; &lt;/div&gt;;
}
container.innerHTML += cardHTML;
});

const now = new Date();
document.getElementById('time-display').innerText = 최근 업데이트:${now.toLocaleTimeString()}`;
}

function addTicker() {
const nameInput = document.getElementById('newName');
const tickerInput = document.getElementById('newTicker');
const name = nameInput.value.trim();
let symbol = tickerInput.value.trim().toUpperCase();

if (!name || !symbol) {
alert("종목명과 티커를 모두 입력해 주세요.");
return;
}

const isKoreanStock = /^\d{6}$`/.test(symbol);
if (isKoreanStock) symbol += '.KS';

myTickers.push({
name: name,
symbol: symbol,
isKRW: isKoreanStock || symbol.includes('.KS')
});

saveTickers();
nameInput.value = '';
tickerInput.value = '';
fetchETFData();
}

function removeTicker(index) {
if(confirm("이 종목을 삭제하시겠습니까?")) {
myTickers.splice(index, 1);
saveTickers();
fetchETFData();
}
}

function copyReport() {
if (etfDataList.length === 0) return;
let reportText = "[주요 ETF 및 종목 동향]\n\n";
etfDataList.forEach(etf => {
const isUp = etf.changeRate > 0;
const sign = isUp ? '▲' : '▼';
reportText += -${etf.name}: {sign}${Math.abs(etf.changeRate).toFixed(2)}%)\n`;
});
navigator.clipboard.writeText(reportText).then(() => {
alert("보고용 텍스트가 클립보드에 복사되었습니다.");
}).catch(err => {
alert("복사에 실패했습니다.");
});
}

fetchETFData();
</script>
</body>
</html>
